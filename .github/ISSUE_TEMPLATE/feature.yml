name: Feature Spec
description: Fully scoped feature specification
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Why does this need to exist? What's the user pain or gap?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should it do? Include example commands and expected output.
    validations:
      required: true
  - type: textarea
    id: user-stories
    attributes:
      label: User Stories
      description: Who benefits and how?
      placeholder: |
        - As a human user, I want to ... so that ...
        - As an AI agent, I want to ... so that ...
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable conditions that must be met.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: design-notes
    attributes:
      label: Design Notes
      description: Architecture decisions, dependencies, or open questions.
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What this issue intentionally does NOT cover.
